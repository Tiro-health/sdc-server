# Cloud Build pipeline for tiro-sdc-server.
#
# Pulls fhir-sdc from atticus (private Python GAR) using a short-lived access
# token minted from Cloud Build's default SA, then publishes a multi-arch
# (linux/amd64 + linux/arm64) image to
# europe-west1-docker.pkg.dev/$PROJECT_ID/public/tiro-sdc-server.
#
# Triggers (configured out-of-band; see README):
#   - push to main      → tags :$SHORT_SHA + :main
#   - push of a v* tag  → tags :$SHORT_SHA + :$TAG_NAME + :latest
#
# Manual invocation (no GitHub trigger):
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD),BRANCH_NAME=manual
#
# `$VAR` is a Cloud Build substitution. `$$VAR` is literal `$VAR` for the
# shell. The build-and-push step runs under Alpine's sh — POSIX only, no
# bash arrays.

steps:
  # Cloud Build's default SA already has reader on atticus; print an OAuth
  # token to the shared /workspace volume so the docker build step can
  # mount it as a BuildKit secret (and use it to docker login for the push).
  - name: gcr.io/cloud-builders/gcloud
    id: mint-token
    entrypoint: bash
    args:
      - -c
      - gcloud auth print-access-token > /workspace/gar-token

  # Install QEMU binfmt handlers so the linux/arm64 leg can run on this
  # amd64 host.
  - name: docker:24
    id: setup-qemu
    args: [run, --privileged, --rm, tonistiigi/binfmt, --install, all]

  - name: docker:24
    id: build-and-push
    env:
      - DOCKER_BUILDKIT=1
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        IMAGE="europe-west1-docker.pkg.dev/$PROJECT_ID/public/tiro-sdc-server"

        # Build a space-separated tag list (no spaces inside individual tags,
        # so word splitting on the consumer side is safe).
        TAGS="$$IMAGE:$SHORT_SHA"
        if [ -n "$BRANCH_NAME" ]; then
          TAGS="$$TAGS $$IMAGE:$BRANCH_NAME"
        fi
        if [ -n "$TAG_NAME" ]; then
          TAGS="$$TAGS $$IMAGE:$TAG_NAME $$IMAGE:latest"
        fi

        # buildx --push needs registry credentials. GAR accepts the same
        # OAuth token as a docker login password under oauth2accesstoken.
        cat /workspace/gar-token | docker login \
          -u oauth2accesstoken --password-stdin europe-west1-docker.pkg.dev

        # docker-container driver is required for multi-arch buildx.
        docker buildx create --name multi --driver=docker-container --use --bootstrap

        # Compose the -t flags (deliberately unquoted to word-split TAGS).
        T_ARGS=""
        for t in $$TAGS; do
          T_ARGS="$$T_ARGS -t $$t"
        done

        docker buildx build \
          --platform=linux/amd64,linux/arm64 \
          --secret=id=gar_token,src=/workspace/gar-token \
          $$T_ARGS \
          --push \
          .

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
# arm64 runs under QEMU emulation; budget extra time over the ~1 min
# single-arch build.
timeout: 1800s
